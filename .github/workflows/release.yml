name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: macos-14
            target: bun-darwin-arm64
            artifact: seats-darwin-arm64
          - os: macos-14
            target: bun-darwin-x64
            artifact: seats-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: seats-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun build --compile --minify --target=${{ matrix.target }} --outfile ${{ matrix.artifact }} src/cli.ts
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: chmod +x seats-*
      - run: shasum -a 256 seats-* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            seats-*
            checksums.txt
          generate_release_notes: true

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_GH_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_ARM64=$(grep darwin-arm64 checksums.txt | awk '{print $1}')
          SHA_X64=$(grep darwin-x64 checksums.txt | awk '{print $1}')
          SHA_LINUX=$(grep linux-x64 checksums.txt | awk '{print $1}')

          git clone https://x-access-token:${TAP_TOKEN}@github.com/tksohishi/homebrew-tap.git tap
          cd tap

          sed -e "s/version \".*\"/version \"${VERSION}\"/" \
              -e "0,/sha256 \".*\"/s/sha256 \".*\"/sha256 \"${SHA_ARM64}\"/" \
              -e "0,/sha256 \".*\"/! { 0,/sha256 \".*\"/s/sha256 \".*\"/sha256 \"${SHA_X64}\"/ }" \
              Formula/seats.rb > Formula/seats.rb.tmp

          awk -v sha="$SHA_LINUX" 'BEGIN{n=0} /sha256/{n++; if(n==3) sub(/sha256 ".*"/, "sha256 \""sha"\"")} {print}' \
              Formula/seats.rb.tmp > Formula/seats.rb
          rm Formula/seats.rb.tmp

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/seats.rb
          git commit -m "Update seats to ${VERSION}"
          git push
