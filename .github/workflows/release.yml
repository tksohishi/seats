name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: macos-14
            target: bun-darwin-arm64
            artifact: seats-darwin-arm64
          - os: macos-14
            target: bun-darwin-x64
            artifact: seats-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: seats-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun build --compile --minify --target=${{ matrix.target }} --outfile ${{ matrix.artifact }} src/cli.ts
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: chmod +x seats-*
      - run: shasum -a 256 seats-* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            seats-*
            checksums.txt
          generate_release_notes: true
